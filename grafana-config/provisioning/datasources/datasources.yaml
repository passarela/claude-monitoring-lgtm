apiVersion: 1

datasources:
  # ── Mimir (Prometheus-compatible) ─────────────────────────────────────────
  - name: Mimir
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 15s
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: View Trace in Tempo

  # ── Loki ──────────────────────────────────────────────────────────────────
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true
    jsonData: {}

  # ── Tempo ─────────────────────────────────────────────────────────────────
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: '{service_name="claude-code"} | json | attributes_session_id=`$${__span.tags["session.id"]}`'

      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: '-5m'
        spanEndTimeShift: '5m'
        tags:
          - key: service.name
            value: service
          - key: session.id
            value: session_id
        queries:
          - name: 'Request rate'
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags}[5m]))'
          - name: 'Error rate'
            query: 'sum(rate(traces_spanmetrics_calls_total{$$__tags,status_code="STATUS_CODE_ERROR"}[5m]))'
          - name: 'p95 duration'
            query: 'histogram_quantile(0.95, sum(rate(traces_spanmetrics_latency_bucket{$$__tags}[5m])) by (le))'

      serviceMap:
        datasourceUid: prometheus

      nodeGraph:
        enabled: true

      search:
        hide: false

      spanBar:
        type: 'Tag'
        tag: 'http.path'
