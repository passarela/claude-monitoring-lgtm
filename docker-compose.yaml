### STACK DE MONITORAMENTO CLAUDE — LGTM (Loki · Grafana · Tempo · Mimir)
services:
  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    ports:
      - "9009:9009"
    volumes:
      - ./mimir-config/mimir.yaml:/etc/mimir/mimir.yaml
      - mimir_data:/data
    command:
      - '-config.file=/etc/mimir/mimir.yaml'
      - '-target=all'
      - '-ingester.native-histograms-ingestion-enabled=true'

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config/loki.yaml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:latest
    container_name: tempo
    ports:
      - "3200:3200"   # Tempo HTTP / query API
    volumes:
      - ./tempo-config/tempo.yaml:/etc/tempo.yaml
    command: -config.file=/etc/tempo.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana-config/provisioning:/etc/grafana/provisioning

  alloy:
    image: grafana/alloy:latest
    container_name: alloy
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "12345:12345" # Alloy UI
    volumes:
      - ./alloy-config/config.alloy:/etc/alloy/config.alloy
    command:
      - 'run'
      - '--server.http.listen-addr=0.0.0.0:12345'
      - '--stability.level=experimental'
      - '/etc/alloy/config.alloy'
    depends_on:
      - mimir

volumes:
  mimir_data: